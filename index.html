<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Forjars Pallet Pro Studio</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f2f5; font-family: -apple-system, sans-serif; display: flex; }
        #ui-sidebar {
            width: 360px; height: 100vh; background: #fff; overflow-y: auto;
            padding: 25px; box-sizing: border-box; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 10;
        }
        .section { margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        h3 { margin: 0 0 15px 0; font-size: 13px; text-transform: uppercase; color: #555; letter-spacing: 0.5px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 13px; }
        
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .upload-box { 
            font-size: 9px; border: 2px dashed #ccc; padding: 8px; text-align: center; 
            border-radius: 6px; cursor: pointer; background: #fff;
        }
        .upload-box.active { border-color: #2ecc71; background: #e8f5e9; }

        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .preset-btn { 
            padding: 8px; font-size: 11px; background: #eee; border: none; border-radius: 4px; 
            cursor: pointer; transition: 0.2s; font-weight: 600;
        }
        .preset-btn:hover { background: #ddd; }

        #stats { background: #1a1a1a; color: #fff; padding: 15px; border-radius: 10px; margin-top: 15px; }
        #stats div { margin-bottom: 5px; font-size: 13px; display: flex; justify-content: space-between; }
        #stats span { font-weight: bold; color: #4ade80; }

        .main-btn {
            width: 100%; padding: 15px; background: #000; color: #fff; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 14px;
        }
        #canvas-container { flex-grow: 1; height: 100vh; background: radial-gradient(circle, #ffffff 0%, #dcdcdc 100%); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="ui-sidebar">
    <div class="section">
        <h3>🎥 Вигляд (Presets)</h3>
        <div class="preset-grid">
            <button class="preset-btn" onclick="setCamera('iso')">Ізометрія (3/4)</button>
            <button class="preset-btn" onclick="setCamera('top')">Зверху</button>
            <button class="preset-btn" onclick="setCamera('front')">Спереду</button>
            <button class="preset-btn" onclick="setCamera('side')">Збоку</button>
        </div>
    </div>

    <div class="section">
        <h3>📦 Розміри (in)</h3>
        <div class="grid-inputs">
            <div><label>Кор. L</label><input type="number" id="boxL" value="12"></div>
            <div><label>Кор. W</label><input type="number" id="boxW" value="10"></div>
            <div><label>Кор. H</label><input type="number" id="boxH" value="8"></div>
            <div><label>Пал. L</label><input type="number" id="palL" value="48"></div>
            <div><label>Пал. W</label><input type="number" id="palW" value="40"></div>
            <div><label>Вага кор.</label><input type="number" id="boxWeight" value="20"></div>
        </div>
    </div>

    <div class="section">
        <h3>🏗️ Укладка</h3>
        <select id="stackType">
            <option value="auto">Авто-вибір</option>
            <option value="long">Подовжньо</option>
            <option value="cross">Поперечно</option>
        </select>
        <div style="margin-top:10px;">
            <label>Шари: <span id="layerVal">5</span></label>
            <input type="range" id="layerRange" min="1" max="25" value="5">
        </div>
    </div>

    <div class="section">
        <h3>🎨 Дизайн (Клік + Cmd+V)</h3>
        <div class="upload-grid">
            <div class="upload-box active" id="btn_front" onclick="setActiveSide('front')">Перед</div>
            <div class="upload-box" id="btn_back" onclick="setActiveSide('back')">Зад</div>
            <div class="upload-box" id="btn_left" onclick="setActiveSide('left')">Ліво</div>
            <div class="upload-box" id="btn_right" onclick="setActiveSide('right')">Право</div>
            <div class="upload-box" id="btn_top" onclick="setActiveSide('top')">Верх</div>
        </div>
    </div>

    <div id="stats">
        <div>Коробок: <span id="stat_total">0</span></div>
        <div>Вага: <span id="stat_weight">0</span> lb</div>
        <div>Висота: <span id="stat_height">0</span> in</div>
    </div>

    <button class="main-btn" id="copyBtn">📸 Копіювати PNG (Прозорий)</button>
</div>

<div id="canvas-container"></div>

<script>
    let scene, camera, renderer, controls, activeSide = 'front';
    let boxesGroup = new THREE.Group(), palletGroup = new THREE.Group(), mainGroup = new THREE.Group();
    let textures = { top: null, front: null, back: null, left: null, right: null };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 360) / window.innerHeight, 1, 3000);
        camera.position.set(120, 120, 120);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth - 360, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 1.9;

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.4);
        light.position.set(100, 200, 100);
        scene.add(light);

        mainGroup.add(palletGroup); mainGroup.add(boxesGroup);
        scene.add(mainGroup);
        
        setupInputs();
        update();
    }

    function setCamera(type) {
        const box = new THREE.Box3().setFromObject(mainGroup);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const dist = Math.max(size.x, size.y, size.z) * 1.5;

        controls.target.copy(center);
        if(type === 'iso') camera.position.set(center.x + dist, center.y + dist, center.z + dist);
        if(type === 'top') camera.position.set(center.x, center.y + dist * 1.5, center.z);
        if(type === 'front') camera.position.set(center.x, center.y, center.z + dist * 1.8);
        if(type === 'side') camera.position.set(center.x + dist * 1.8, center.y, center.z);
        
        controls.update();
    }

    function setActiveSide(side) {
        activeSide = side;
        document.querySelectorAll('.upload-box').forEach(b => b.classList.remove('active'));
        document.getElementById('btn_' + side).classList.add('active');
    }

    function setupInputs() {
        window.addEventListener('paste', (e) => {
            const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
            if (!item) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { textures[activeSide] = img; update(); };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(item.getAsFile());
        });

        ['boxL','boxW','boxH','palL','palW','stackType','layerRange'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                if(id === 'layerRange') document.getElementById('layerVal').innerText = document.getElementById(id).value;
                update();
            });
        });
    }

    function getMat(side) {
        if (!textures[side]) return new THREE.MeshStandardMaterial({ color: 0xC19A6B, roughness: 0.8 });
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#C19A6B'; ctx.fillRect(0,0,512,512);
        ctx.globalCompositeOperation = 'multiply';
        ctx.drawImage(textures[side], 0, 0, 512, 512);
        return new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(canvas), roughness: 0.7 });
    }

    function buildRealPallet(pL, pW) {
        palletGroup.clear();
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.9 });
        
        // 1. Нижні дошки (3 шт)
        for(let i=0; i<3; i++) {
            const board = new THREE.Mesh(new THREE.BoxGeometry(pL, 0.8, 4), woodMat);
            board.position.set(0, 0.4, (i-1)*(pW/2-2));
            palletGroup.add(board);
        }
        // 2. Бруси (3 шт)
        for(let i=0; i<3; i++) {
            const block = new THREE.Mesh(new THREE.BoxGeometry(4, 3.5, pW), woodMat);
            block.position.set((i-1)*(pL/2-2), 2.5, 0);
            palletGroup.add(block);
        }
        // 3. Верхні дошки (5 шт)
        for(let i=0; i<5; i++) {
            const board = new THREE.Mesh(new THREE.BoxGeometry(pL, 0.8, 5), woodMat);
            board.position.set(0, 4.6, (i-2)*(pW/4.5));
            palletGroup.add(board);
        }
    }

    function update() {
        boxesGroup.clear();
        const bL = parseFloat(document.getElementById('boxL').value), bW = parseFloat(document.getElementById('boxW').value), bH = parseFloat(document.getElementById('boxH').value);
        const pL = parseFloat(document.getElementById('palL').value), pW = parseFloat(document.getElementById('palW').value);
        const layers = parseInt(document.getElementById('layerRange').value);
        const mode = document.getElementById('stackType').value;

        buildRealPallet(pL, pW);

        let best = {c: Math.floor(pL/bL), r: Math.floor(pW/bW), l: bL, w: bW};
        let alt = {c: Math.floor(pL/bW), r: Math.floor(pW/bL), l: bW, w: bL};
        let sel = (mode === 'auto') ? (best.c*best.r >= alt.c*alt.r ? best : alt) : (mode === 'long' ? best : alt);

        const mats = [getMat('right'), getMat('left'), getMat('top'), new THREE.MeshStandardMaterial({color: 0xC19A6B}), getMat('front'), getMat('back')];
        const geo = new THREE.BoxGeometry(sel.l, bH, sel.w);

        for(let l=0; l<layers; l++) {
            for(let c=0; c<sel.c; c++) {
                for(let r=0; r<sel.r; r++) {
                    const box = new THREE.Mesh(geo, mats);
                    box.position.set((c*sel.l)-(pL/2)+(sel.l/2), 5.5+(l*bH)+(bH/2), (r*sel.w)-(pW/2)+(sel.w/2));
                    const edge = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({color:0x000, opacity:0.1, transparent:true}));
                    box.add(edge); boxesGroup.add(box);
                }
            }
        }

        const total = sel.c * sel.r * layers;
        document.getElementById('stat_total').innerText = total;
        document.getElementById('stat_weight').innerText = (total * parseFloat(document.getElementById('boxWeight').value) + 45).toFixed(0);
        document.getElementById('stat_height').innerText = (5 + layers * bH).toFixed(1);
    }

    document.getElementById('copyBtn').addEventListener('click', () => {
        renderer.setClearColor(0x000000, 0);
        renderer.render(scene, camera);
        renderer.domElement.toBlob(blob => {
            navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
            alert("Зображення (прозоре) в буфері!");
        });
    });

    init();
    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    animate();
    window.addEventListener('resize', () => {
        camera.aspect = (window.innerWidth - 360) / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth - 360, window.innerHeight);
    });
</script>
</body>
</html>
