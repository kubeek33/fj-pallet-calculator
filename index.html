<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Forjars Pallet Master Pro (Transparent Copy)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f2f5; font-family: -apple-system, sans-serif; display: flex; }
        #ui-sidebar {
            width: 360px; height: 100vh; background: #fff; overflow-y: auto;
            padding: 25px; box-sizing: border-box; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 10;
        }
        .section { margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        h3 { margin: 0 0 15px 0; font-size: 13px; text-transform: uppercase; color: #555; letter-spacing: 0.5px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 13px; }
        
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .upload-box { 
            font-size: 9px; border: 2px dashed #ccc; padding: 8px; text-align: center; 
            border-radius: 6px; cursor: pointer; background: #fff;
        }
        .upload-box.active { border-color: #2ecc71; background: #e8f5e9; }

        #stats { background: #1a1a1a; color: #fff; padding: 15px; border-radius: 10px; margin-top: 15px; }
        #stats div { margin-bottom: 5px; font-size: 13px; display: flex; justify-content: space-between; }
        #stats span { font-weight: bold; color: #4ade80; }

        button {
            width: 100%; padding: 12px; background: #000; color: #fff; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        #canvas-container { flex-grow: 1; height: 100vh; background: radial-gradient(circle, #ffffff 0%, #dcdcdc 100%); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="ui-sidebar">
    <div class="section">
        <h3>📦 Коробка & Палета (in)</h3>
        <div class="grid-inputs">
            <div><label>Кор. L</label><input type="number" id="boxL" value="12"></div>
            <div><label>Кор. W</label><input type="number" id="boxW" value="10"></div>
            <div><label>Кор. H</label><input type="number" id="boxH" value="8"></div>
            <div><label>Кор. Вага</label><input type="number" id="boxWeight" value="20"></div>
            <div><label>Пал. L</label><input type="number" id="palL" value="48"></div>
            <div><label>Пал. W</label><input type="number" id="palW" value="40"></div>
        </div>
    </div>

    <div class="section">
        <h3>🏗️ Керування Укладкою</h3>
        <label>Тип розміщення</label>
        <select id="stackType">
            <option value="auto">Авто (Найбільша кількість)</option>
            <option value="long">Подовжньо</option>
            <option value="cross">Поперечно</option>
        </select>
        <div style="margin-top:10px;">
            <label>Кількість шарів: <span id="layerVal">5</span></label>
            <input type="range" id="layerRange" min="1" max="20" value="5">
        </div>
        <div style="margin-top:10px;">
            <label>Зазор між кор. (in)</label>
            <input type="number" id="gap" value="0.1" step="0.1">
        </div>
    </div>

    <div class="section">
        <h3>🎨 Дизайн (Клік + Cmd+V)</h3>
        <div class="upload-grid">
            <div class="upload-box active" id="btn_front" onclick="setActiveSide('front')">Перед</div>
            <div class="upload-box" id="btn_back" onclick="setActiveSide('back')">Зад</div>
            <div class="upload-box" id="btn_left" onclick="setActiveSide('left')">Ліво</div>
            <div class="upload-box" id="btn_right" onclick="setActiveSide('right')">Право</div>
            <div class="upload-box" id="btn_top" onclick="setActiveSide('top')">Верх</div>
        </div>
    </div>

    <div id="stats">
        <div>Використано площі: <span id="stat_area">0%</span></div>
        <div>Всього коробок: <span id="stat_total">0</span></div>
        <div>Загальна вага: <span id="stat_weight">0</span> lb</div>
        <div>Висота з пал.: <span id="stat_height">0</span> in</div>
    </div>

    <button id="copyBtn">📸 Копіювати Об'єкт (Прозорий)</button>
</div>

<div id="canvas-container"></div>

<script>
    let scene, camera, renderer, controls, activeSide = 'front';
    let boxesGroup = new THREE.Group(), palletGroup = new THREE.Group(), mainGroup = new THREE.Group();
    let textures = { top: null, front: null, back: null, left: null, right: null };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 360) / window.innerHeight, 0.1, 2000);
        camera.position.set(100, 120, 150);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth - 360, window.innerHeight);
        // renderer.setClearColor(0x000000, 0); // Прозорий фон за замовчуванням
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 1.9; // Майже горизонтально, але не під підлогу

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 0.5);
        sun.position.set(100, 200, 100);
        sun.castShadow = true;
        scene.add(sun);

        mainGroup.add(palletGroup); mainGroup.add(boxesGroup);
        scene.add(mainGroup);
        
        setupInputs();
        update();
    }

    function setActiveSide(side) {
        activeSide = side;
        document.querySelectorAll('.upload-box').forEach(b => b.classList.remove('active'));
        document.getElementById('btn_' + side).classList.add('active');
    }

    function setupInputs() {
        window.addEventListener('paste', (e) => {
            const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
            if (!item) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { textures[activeSide] = img; update(); };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(item.getAsFile());
        });

        ['boxL','boxW','boxH','palL','palW','stackType','layerRange','gap'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                if(id === 'layerRange') document.getElementById('layerVal').innerText = document.getElementById(id).value;
                update();
            });
        });
    }

    function getMat(side) {
        if (!textures[side]) return new THREE.MeshStandardMaterial({ color: 0xC19A6B, roughness: 0.8 });
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#C19A6B'; ctx.fillRect(0,0,512,512);
        ctx.globalCompositeOperation = 'multiply';
        ctx.drawImage(textures[side], 0, 0, 512, 512);
        return new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(canvas), roughness: 0.7 });
    }

    function update() {
        boxesGroup.clear(); palletGroup.clear();
        
        const bL = parseFloat(document.getElementById('boxL').value), bW = parseFloat(document.getElementById('boxW').value), bH = parseFloat(document.getElementById('boxH').value);
        const pL = parseFloat(document.getElementById('palL').value), pW = parseFloat(document.getElementById('palW').value);
        const layers = parseInt(document.getElementById('layerRange').value);
        const gap = parseFloat(document.getElementById('gap').value);
        const mode = document.getElementById('stackType').value;

        // Палета
        const palGeo = new THREE.BoxGeometry(pL, 5, pW);
        const palMesh = new THREE.Mesh(palGeo, new THREE.MeshLambertMaterial({color: 0x7a5230}));
        palMesh.position.y = 2.5; palMesh.castShadow = true; palMesh.receiveShadow = true;
        palletGroup.add(palMesh);

        // Розрахунок
        let best = {c: Math.floor(pL/(bL+gap)), r: Math.floor(pW/(bW+gap)), l: bL, w: bW};
        let alt = {c: Math.floor(pL/(bW+gap)), r: Math.floor(pW/(bL+gap)), l: bW, w: bL};
        
        let selected = best;
        if(mode === 'auto') selected = (best.c*best.r >= alt.c*alt.r) ? best : alt;
        else if(mode === 'cross') selected = alt;

        const mats = [getMat('right'), getMat('left'), getMat('top'), new THREE.MeshStandardMaterial({color: 0xC19A6B}), getMat('front'), getMat('back')];
        const geo = new THREE.BoxGeometry(selected.l, bH, selected.w);

        for(let l=0; l<layers; l++) {
            for(let c=0; c<selected.c; c++) {
                for(let r=0; r<selected.r; r++) {
                    const box = new THREE.Mesh(geo, mats);
                    box.position.set((c*(selected.l+gap))-(pL/2)+(selected.l/2), 5+(l*bH)+(bH/2), (r*(selected.w+gap))-(pW/2)+(selected.w/2));
                    box.castShadow = true; box.receiveShadow = true;
                    boxesGroup.add(box);
                }
            }
        }

        // Стати
        const total = selected.c * selected.r * layers;
        document.getElementById('stat_total').innerText = total;
        document.getElementById('stat_weight').innerText = (total * parseFloat(document.getElementById('boxWeight').value) + 40).toFixed(0);
        document.getElementById('stat_height').innerText = (5 + layers * bH).toFixed(1);
        document.getElementById('stat_area').innerText = (((selected.c*selected.r*selected.l*selected.w)/(pL*pW))*100).toFixed(0) + "%";
    }

    // Логіка КУПІЮВАННЯ ОБ'ЄКТА З ПРОЗОРИМ ФОНОМ
    function copySceneOnly() {
        // 1. Зберігаємо поточний стан камери та контролів
        const originalPosition = camera.position.clone();
        const originalTarget = controls.target.clone();

        // 2. Обчислюємо обмежувальну коробку (Bounding Box) всього вантажу
        const box = new THREE.Box3().setFromObject(mainGroup);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        // 3. Тимчасово фокусуємо камеру на центрі об'єкта
        controls.target.copy(center);
        
        // 4. Авто-масштабування (fit to screen)
        const maxDim = Math.max(size.x, size.y, size.z);
        const fov = camera.fov * (Math.PI / 180);
        let cameraZ = Math.abs(maxDim / 2 * Math.tan(fov * 2)); // Приблизний розрахунок дистанції

        // Зміщуємо камеру, щоб об'єкт зайняв весь кадр
        camera.position.set(center.x + cameraZ/1.5, center.y + cameraZ/2, center.z + cameraZ/1.5);
        camera.lookAt(center);
        controls.update();

        // 5. Примусовий рендер з прозорим фоном
        renderer.setClearColor(0x000000, 0); // Гарантуємо альфа=0
        renderer.render(scene, camera);

        // 6. Копіювання в буфер
        renderer.domElement.toBlob(blob => {
            navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
            
            // 7. Відновлюємо попередній стан камери, щоб користувач не помітив стрибка
            camera.position.copy(originalPosition);
            controls.target.copy(originalTarget);
            controls.update();
            
            // Повертаємо дефолтний фон (якщо він був не прозорий)
            // renderer.setClearColor(0x000000, 0); 

            alert("Прозорий об'єкт (палета+коробки) скопійовано!");
        }, 'image/png');
    }

    document.getElementById('copyBtn').addEventListener('click', copySceneOnly);

    init();
    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    animate();
    window.addEventListener('resize', () => {
        camera.aspect = (window.innerWidth - 360) / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth - 360, window.innerHeight);
    });
</script>
</body>
</html>
