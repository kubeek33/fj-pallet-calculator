<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Forjars Pro Pallet Calculator</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f4f4f4; font-family: sans-serif; display: flex; }
        #ui-sidebar {
            width: 350px; height: 100vh; background: #fff; overflow-y: auto;
            padding: 20px; box-sizing: border-box; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 10;
        }
        .section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        h3 { margin: 0 0 15px 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .upload-box { font-size: 10px; border: 1px dashed #ccc; padding: 5px; text-align: center; }
        button {
            width: 100%; padding: 12px; background: #000; color: #fff; border: none;
            border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        #stats { background: #f9f9f9; padding: 15px; border-radius: 6px; margin-top: 20px; font-size: 14px; }
        #canvas-container { flex-grow: 1; height: 100vh; position: relative; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="ui-sidebar">
    <h3>📦 Параметри Коробки (in)</h3>
    <div class="section grid-inputs">
        <div><label>Довжина</label><input type="number" id="boxL" value="15"></div>
        <div><label>Ширина</label><input type="number" id="boxW" value="10"></div>
        <div><label>Висота</label><input type="number" id="boxH" value="10"></div>
        <div><label>Вага (lb)</label><input type="number" id="boxWeight" value="15"></div>
    </div>

    <h3>🪵 Параметри Палети (in)</h3>
    <div class="section grid-inputs">
        <div><label>Довжина (L)</label><input type="number" id="palL" value="48"></div>
        <div><label>Ширина (W)</label><input type="number" id="palW" value="40"></div>
        <div><label>Макс Висота</label><input type="number" id="maxH" value="86"></div>
    </div>

    <h3>🎨 Дизайн Сторін</h3>
    <div class="section">
        <div class="upload-grid">
            <div class="upload-box">Перед<input type="file" id="tex_front" accept="image/*"></div>
            <div class="upload-box">Зад<input type="file" id="tex_back" accept="image/*"></div>
            <div class="upload-box">Ліво<input type="file" id="tex_left" accept="image/*"></div>
            <div class="upload-box">Право<input type="file" id="tex_right" accept="image/*"></div>
            <div class="upload-box" style="grid-column: span 2;">Верх<input type="file" id="tex_top" accept="image/*"></div>
        </div>
    </div>

    <div id="stats">
        <strong>Результат:</strong><br>
        Коробок у шарі: <span id="res_per_layer">0</span><br>
        Всього шарів: <span id="res_layers">0</span><br>
        Всього коробок: <span id="res_total">0</span><br>
        Загальна вага: <span id="res_weight">0</span> lb
    </div>

    <button id="copyBtn">📋 Скопіювати 3D модель</button>
</div>

<div id="canvas-container"></div>

<script>
    let scene, camera, renderer, controls;
    let boxesGroup = new THREE.Group();
    let palletGroup = new THREE.Group();
    let textures = { top: null, front: null, back: null, left: null, right: null };

    const KRAFT_COLOR = 0xC19A6B;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 350) / window.innerHeight, 0.1, 1000);
        camera.position.set(100, 100, 100);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth - 350, window.innerHeight);
        renderer.setClearColor(0x000000, 0); 
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        const amb = new THREE.AmbientLight(0xffffff, 0.8); scene.add(amb);
        const dir = new THREE.DirectionalLight(0xffffff, 0.5); dir.position.set(50,100,50); scene.add(dir);

        scene.add(palletGroup);
        scene.add(boxesGroup);

        updateVisualization();
    }

    function createTexturedMaterial(sideName) {
        if (!textures[sideName]) return new THREE.MeshStandardMaterial({ color: KRAFT_COLOR });

        const canvas = document.createElement('canvas');
        const img = textures[sideName];
        canvas.width = img.width; canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#C19A6B';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'multiply';
        ctx.drawImage(img, 0, 0);

        const tex = new THREE.CanvasTexture(canvas);
        return new THREE.MeshStandardMaterial({ map: tex });
    }

    function updateVisualization() {
        // Очистка
        while(boxesGroup.children.length > 0) boxesGroup.remove(boxesGroup.children[0]);
        while(palletGroup.children.length > 0) palletGroup.remove(palletGroup.children[0]);

        const bL = parseFloat(document.getElementById('boxL').value);
        const bW = parseFloat(document.getElementById('boxW').value);
        const bH = parseFloat(document.getElementById('boxH').value);
        const bWeight = parseFloat(document.getElementById('boxWeight').value);

        const pL = parseFloat(document.getElementById('palL').value);
        const pW = parseFloat(document.getElementById('palW').value);
        const maxH = parseFloat(document.getElementById('maxH').value);

        // Малюємо палету
        const palBase = new THREE.Mesh(new THREE.BoxGeometry(pL, 5, pW), new THREE.MeshLambertMaterial({color: 0x8b5a2b}));
        palBase.position.y = 2.5;
        palletGroup.add(palBase);

        // Розрахунок вмісту (спрощений жадібний алгоритм для прямої сітки)
        const cols = Math.floor(pL / bL);
        const rows = Math.floor(pW / bW);
        const layers = Math.floor((maxH - 5) / bH);
        
        const perLayer = cols * rows;
        const total = perLayer * layers;

        // Матеріали (право, ліво, верх, низ, перед, зад)
        const materials = [
            createTexturedMaterial('right'), createTexturedMaterial('left'),
            createTexturedMaterial('top'), new THREE.MeshStandardMaterial({ color: KRAFT_COLOR }),
            createTexturedMaterial('front'), createTexturedMaterial('back')
        ];

        const boxGeo = new THREE.BoxGeometry(bL, bH, bW);
        
        for(let l=0; l<layers; l++) {
            for(let c=0; c<cols; c++) {
                for(let r=0; r<rows; r++) {
                    const box = new THREE.Mesh(boxGeo, materials);
                    box.position.set(
                        (c * bL) - (pL/2) + (bL/2),
                        5 + (l * bH) + (bH/2),
                        (r * bW) - (pW/2) + (bW/2)
                    );
                    
                    const edges = new THREE.LineSegments(
                        new THREE.EdgesGeometry(boxGeo), 
                        new THREE.LineBasicMaterial({ color: 0x000000, opacity: 0.1, transparent: true })
                    );
                    box.add(edges);
                    boxesGroup.add(box);
                }
            }
        }

        // Статистика
        document.getElementById('res_per_layer').innerText = perLayer;
        document.getElementById('res_layers').innerText = layers;
        document.getElementById('res_total').innerText = total;
        document.getElementById('res_weight').innerText = (total * bWeight + 50).toFixed(1); // +50lb палета
    }

    // Слухачі файлів
    ['top','front','back','left','right'].forEach(side => {
        document.getElementById('tex_'+side).addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => { textures[side] = img; updateVisualization(); };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });
    });

    // Слухачі інпутів
    document.querySelectorAll('input[type="number"]').forEach(input => {
        input.addEventListener('input', updateVisualization);
    });

    // Копіювання чистої моделі
    document.getElementById('copyBtn').addEventListener('click', async () => {
        renderer.render(scene, camera);
        renderer.domElement.toBlob(blob => {
            navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
            alert("Скопійовано! Тепер можна вставити в ClickUp або Photoshop (буде лише палета без кнопок).");
        });
    });

    window.addEventListener('resize', () => {
        camera.aspect = (window.innerWidth - 350) / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth - 350, window.innerHeight);
    });

    init();
    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    animate();
</script>
</body>
</html>
