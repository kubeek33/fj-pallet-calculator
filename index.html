<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Forjars Pallet Calculator</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f4f4f4; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #ui-container {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 24px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            z-index: 10; width: 320px; backdrop-filter: blur(10px);
        }
        h2 { margin-top: 0; font-size: 20px; color: #111; margin-bottom: 20px; font-weight: 600; }
        .control-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #444; font-weight: 500;}
        input[type="file"] { 
            width: 100%; font-size: 13px; color: #666;
            file-selector-button: border: none; padding: 8px 12px; border-radius: 6px; background: #eee; cursor: pointer;
        }
        button {
            width: 100%; padding: 12px; background: #000; color: #fff;
            border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600; transition: 0.2s;
        }
        button:hover { background: #333; transform: translateY(-1px); }
        #canvas-container { width: 100vw; height: 100vh; background: transparent; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="ui-container">
    <h2>Візуалізатор Палет 📦</h2>
    
    <div class="control-group">
        <label>Дизайн коробки (.jpg / .png)</label>
        <input type="file" id="designUpload" accept="image/*">
        <p style="font-size: 12px; color: #888; margin-top: 6px; line-height: 1.4;">Чорний дизайн на білому фоні автоматично накладеться на крафтовий картон.</p>
    </div>

    <button id="copyBtn">📋 Копіювати (Без фону)</button>
</div>

<div id="canvas-container"></div>

<script>
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(50, 60, 70);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0); 
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 15, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(30, 60, 30);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    scene.add(dirLight);

    const palletMaterial = new THREE.MeshLambertMaterial({ color: 0x8b5a2b });
    let boxMaterial = new THREE.MeshStandardMaterial({ color: 0xC19A6B, roughness: 0.9 }); 

    const palletGroup = new THREE.Group();
    const boxesGroup = new THREE.Group();
    scene.add(palletGroup);
    scene.add(boxesGroup);

    function buildPallet() {
        const pWidth = 35, pLength = 30;
        for(let i = 0; i < 5; i++) {
            const board = new THREE.Mesh(new THREE.BoxGeometry(pWidth, 1, 5), palletMaterial);
            board.position.set(0, 3.5, -12 + (i * 6));
            board.castShadow = true; board.receiveShadow = true;
            palletGroup.add(board);
        }
        for(let i = 0; i < 3; i++) {
            const block = new THREE.Mesh(new THREE.BoxGeometry(3, 3, pLength), palletMaterial);
            block.position.set(-15 + (i * 15), 1.5, 0);
            block.castShadow = true; block.receiveShadow = true;
            palletGroup.add(block);
        }
        for(let i = 0; i < 3; i++) {
            const bottomBoard = new THREE.Mesh(new THREE.BoxGeometry(pWidth, 1, 5), palletMaterial);
            bottomBoard.position.set(0, 0, -12 + (i * 12));
            bottomBoard.castShadow = true; bottomBoard.receiveShadow = true;
            palletGroup.add(bottomBoard);
        }
    }

    function buildBoxes() {
        while(boxesGroup.children.length > 0){ boxesGroup.remove(boxesGroup.children[0]); }
        const boxW = 10, boxL = 14, boxH = 9, layers = 5, cols = 3, rows = 2;
        const geometry = new THREE.BoxGeometry(boxW, boxH, boxL);

        for (let l = 0; l < layers; l++) {
            for (let c = 0; c < cols; c++) {
                for (let r = 0; r < rows; r++) {
                    const box = new THREE.Mesh(geometry, boxMaterial);
                    const x = (c - (cols-1)/2) * (boxW + 0.2);
                    const z = (r - (rows-1)/2) * (boxL + 0.2);
                    const y = 4 + (boxH / 2) + (l * boxH);
                    box.position.set(x, y, z);
                    box.castShadow = true; box.receiveShadow = true;

                    const edges = new THREE.EdgesGeometry(geometry);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, opacity: 0.15, transparent: true }));
                    box.add(line);
                    boxesGroup.add(box);
                }
            }
        }
    }

    buildPallet(); buildBoxes();

    document.getElementById('designUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#C19A6B'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'multiply';
                ctx.drawImage(img, 0, 0);
                const texture = new THREE.CanvasTexture(canvas);
                texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
                boxMaterial = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.9 });
                buildBoxes(); 
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    document.getElementById('copyBtn').addEventListener('click', async () => {
        renderer.render(scene, camera);
        renderer.domElement.toBlob(async function(blob) {
            try {
                await navigator.clipboard.write([new ClipboardItem({[blob.type]: blob})]);
                const btn = document.getElementById('copyBtn');
                btn.innerText = "✅ Скопійовано!";
                setTimeout(() => btn.innerText = "📋 Копіювати (Без фону)", 2000);
            } catch (err) { alert("Помилка копіювання."); }
        }, 'image/png');
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
